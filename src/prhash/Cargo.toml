[package]
name = "prhash"
version = "0.1.0"
edition.workspace = true

# `md-5` exposes its API under the `md5` module name, so cargo-machete's
# crate-name-to-identifier check (md-5 -> md_5) misses the real usage in src/main.rs.
[package.metadata.cargo-machete]
ignored = ["md-5"]

[dependencies]
anyhow.workspace = true
blake3.workspace = true
buildinfo.workspace = true
clap.workspace = true
crossterm.workspace = true
hex.workspace = true
indicatif.workspace = true
md-5.workspace = true
sha1.workspace = true
sha2.workspace = true
termbar.workspace = true
tokio.workspace = true

[lints.clippy]
# Prevent potential panics from arithmetic operations (subtraction overflow, etc.)
arithmetic_side_effects = "warn"
# Warn about indexing/slicing that could panic
indexing_slicing = "warn"
# Warn about string slicing which can panic on UTF-8 character boundaries
string_slice = "warn"
