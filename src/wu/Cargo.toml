[package]
name = "wu"
version = "0.1.0"
edition.workspace = true
description = "Cross-platform tool to identify which processes have a file, directory, or device open"

# `windows-sys` is a cfg(target_os = "windows")-only dependency; it cannot be
# compile-verified on macOS/Linux, so cargo-machete's removal check is unsafe here.
[package.metadata.cargo-machete]
ignored = ["windows-sys"]

[dependencies]
anyhow.workspace = true
buildinfo.workspace = true
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
sysinfo.workspace = true
walkdir.workspace = true
which.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
procfs.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys.workspace = true

[lints]
workspace = true
